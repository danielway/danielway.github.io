<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960" width="1280" height="960" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="0.9" stop-color="#79b6ff" stop-opacity="0"/>
      <stop offset="0.93" stop-color="#8cc0ff" stop-opacity="0.55"/>
      <stop offset="0.965" stop-color="#a7d2ff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#a7d2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0b4" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#ff963c" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff5028" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="apo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6cc6ff"/>
      <stop offset="1" stop-color="#6cc6ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="limb"><circle cx="640" cy="1640" r="1150"/></clipPath>
  </defs>

  <!-- space -->
  <rect width="1280" height="960" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#cfe3ff">
    <circle cx="120" cy="90" r="2.0" opacity="0.7"/>
    <circle cx="300" cy="160" r="1.3" opacity="0.5"/>
    <circle cx="470" cy="70" r="1.6" opacity="0.6"/>
    <circle cx="640" cy="140" r="1.1" opacity="0.45"/>
    <circle cx="820" cy="80" r="2.2" opacity="0.75"/>
    <circle cx="980" cy="190" r="1.4" opacity="0.55"/>
    <circle cx="1140" cy="110" r="1.8" opacity="0.65"/>
    <circle cx="1200" cy="300" r="1.2" opacity="0.5"/>
    <circle cx="60" cy="280" r="1.5" opacity="0.6"/>
    <circle cx="220" cy="360" r="1.1" opacity="0.4"/>
    <circle cx="1060" cy="360" r="1.6" opacity="0.6"/>
    <circle cx="900" cy="300" r="1.0" opacity="0.4"/>
    <circle cx="380" cy="250" r="1.3" opacity="0.5"/>
    <circle cx="700" cy="240" r="1.0" opacity="0.4"/>
    <circle cx="1150" cy="470" r="1.4" opacity="0.5"/>
    <circle cx="40" cy="460" r="1.2" opacity="0.45"/>
    <circle cx="1240" cy="200" r="1.5" opacity="0.6"/>
    <circle cx="540" cy="320" r="0.9" opacity="0.4"/>
  </g>

  <!-- atmosphere glow + planet (centre well below frame so we see the upper curve) -->
  <circle cx="640" cy="1640" r="1280" fill="url(#atmo)"/>
  <circle cx="640" cy="1640" r="1150" fill="#27514a"/>
  <g clip-path="url(#limb)">
    <!-- sunlit upper band -->
    <ellipse cx="560" cy="470" rx="940" ry="250" fill="#3f7c62" opacity="0.6"/>
    <ellipse cx="560" cy="445" rx="780" ry="160" fill="#57977a" opacity="0.4"/>
    <!-- terrain -->
    <ellipse cx="430" cy="610" rx="360" ry="108" fill="#1d3e30" opacity="0.5" transform="rotate(-11 430 610)"/>
    <ellipse cx="940" cy="660" rx="270" ry="86" fill="#1a3a4e" opacity="0.5" transform="rotate(9 940 660)"/>
    <!-- ocean-ish lower latitudes -->
    <rect x="0" y="780" width="1280" height="200" fill="#163a52" opacity="0.45"/>
  </g>
  <!-- bright atmospheric limb -->
  <circle cx="640" cy="1640" r="1147" fill="none" stroke="#7fc0ff" stroke-opacity="0.35" stroke-width="9"/>
  <circle cx="640" cy="1640" r="1150" fill="none" stroke="#c4e6ff" stroke-opacity="0.75" stroke-width="3.5"/>

  <!-- orbit ring (dashed, concentric, above the atmosphere) -->
  <circle cx="640" cy="1640" r="1360" fill="none" stroke="#74e0a0" stroke-opacity="0.55"
          stroke-width="3" stroke-dasharray="14 12"/>
  <!-- apoapsis marker on the ring -->
  <circle cx="980" cy="318" r="26" fill="url(#apo)"/>
  <circle cx="980" cy="318" r="7" fill="#6cc6ff"/>
  <circle cx="980" cy="318" r="13" fill="none" stroke="#6cc6ff" stroke-width="2.5"/>

  <!-- ascent trajectory: gravity turn from the pad, bending over toward the ring -->
  <path d="M 470 720 C 470 540, 510 430, 640 360 S 870 318, 980 318"
        fill="none" stroke="#74e0a0" stroke-opacity="0.8" stroke-width="3.5" stroke-dasharray="10 10"/>

  <!-- rocket, mid gravity-turn (leaning right), flame trailing down-left -->
  <g transform="translate(560,470) rotate(34)">
    <!-- flame -->
    <path d="M -22 60 L 22 60 L 6 168 L -6 168 Z" fill="url(#flame)"/>
    <path d="M -12 60 L 12 60 L 2 120 L -2 120 Z" fill="#ffe9a8" opacity="0.9"/>
    <!-- fins -->
    <path d="M -22 34 L -50 78 L -22 78 Z" fill="#7e8ca0"/>
    <path d="M 22 34 L 50 78 L 22 78 Z" fill="#7e8ca0"/>
    <!-- body -->
    <path d="M 0 -86 L 24 -22 L 24 64 L -24 64 L -24 -22 Z" fill="#eaf0f6"/>
    <path d="M 0 -86 L 24 -22 L 0 -10 L -24 -22 Z" fill="#cdd7e3"/>
    <!-- window -->
    <circle cx="0" cy="-2" r="13" fill="#3aa0d8"/>
    <circle cx="-4" cy="-6" r="4" fill="#bfe6fb" opacity="0.8"/>
  </g>
</svg>
